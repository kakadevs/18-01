<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adoro S/A - Gerenciamento de Projetos</title>
    <link rel="icon" type="image/png" href="/img/images.png">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="dash.css">
    <link rel="stylesheet" href="buger.css">
</head>

<body>
    <header>
        <div class="logo">
            <img src="images.png" alt="Logo Adoro S/A" class="logo">


            <h1>Adoro S/A</h1>
        </div>
        <nav>
            <div class="off-screen-menu">
                <img src="images.png" alt="Logo Adoro S/A" class="logo-img">
                <ul>

                    <li><a href="home.html">Inicio</a></li>
                    <li><a href="https://www.adoro.com.br/a-adoro/">Sobre
                            Nós</a></li>
                    <li><a href="https://www.adoro.com.br/receitas/">Receitas
                            Ad'oro</a></li>
                    <li><a href="https://www.adoro.com.br/sac/">Contato</a></li>
                </ul>
            </div>
            <div class="ham-menu">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </nav>
    </header>

    <section id="home">
        <div class="intro">
            <h1>BEM VINDO EQUIPE MEIO - AMBIENTE 🌳</h1>

        </div>
    </section>

    <div class="dashboard">
        <div class="column" id="pendente">
            <h2>Pendente</h2>
            <div class="tasks">
                <div class="task" draggable="true">Novo Projeto</div>
            </div>
            <button class="add-task" onclick="addTask('pendente')">Adicionar
                Projeto</button>
        </div>

        <div class="column" id="analise">
            <h2>Análise</h2>
            <div class="tasks">
                <div class="task" draggable="true">Novo Projeto</div>
            </div>
            <button class="add-task" onclick="addTask('analise')">Adicionar
                Projeto</button>
        </div>

        <div class="column" id="concluido">
            <h2>Concluído</h2>
            <div class="tasks">
                <div class="task" draggable="true">Novo Projeto</div>
            </div>
            <button class="add-task" onclick="addTask('concluido')">Adicionar Projeto</button>
        </div>
    </div>

    <footer>
        <p>© Ad'oro 2025 - Todos os direitos reservados.</p>
    </footer>

    <script src="buger.js"></script>
    <script src="ponto.js"></script>
</body>
</html>
